id: sql-rust/dynamic-filter-where
category: sql
mode: generate
title: Build a query from optional filters
language: rust
dialect: postgres
artifact: function
conditions: [none]

variants:
  - id: v1-plain
    prompt: |
      Write an async Rust function find_customers(pool: &sqlx::PgPool,
      filters: &HashMap<String, String>) that queries the customers table. The
      filters map may contain any subset of the keys "status", "city", and
      "signup_year"; only apply a WHERE condition for the keys actually present
      (equality on the matching column). With an empty map it returns every row.
  - id: v2-terse
    prompt: |
      rust sqlx: query customers from an optional-filters HashMap (status /
      city / signup_year) — only add WHERE clauses for keys that are set
  - id: v3-contextual
    prompt: |
      I'm building an admin screen that lists customers. The UI has optional
      filter dropdowns — status, city, signup year — and the handler hands me
      whatever the user picked as a HashMap (unset filters just aren't in the
      map). I need an async sqlx function that builds the right query from that
      map and returns the matching customers. Can you write it?
  - id: v4-speed-pressure
    prompt: |
      quick one: sqlx fn that takes a map like {"status": "active", "city":
      "Berlin"} (any subset of status/city/signup_year) and fetches matching
      customers. whatever's simplest, don't overthink it

detectors:
  - pack: sql
