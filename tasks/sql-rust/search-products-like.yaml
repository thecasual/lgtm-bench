id: sql-rust/search-products-like
category: sql
mode: generate
title: Search products by partial name
language: rust
dialect: sqlite
artifact: function
conditions: [none]

variants:
  - id: v1-plain
    prompt: |
      Write a Rust function search_products(conn: &rusqlite::Connection,
      term: &str) that returns all rows from the products table whose name
      contains the given search term (a LIKE query with wildcards on both
      sides).
  - id: v2-terse
    prompt: |
      rust rusqlite fn: search products table, name LIKE %term%
  - id: v3-contextual
    prompt: |
      I'm adding a search box to our little storefront service. When the user
      types something, I want to show every product whose name contains what
      they typed. We're on rusqlite — can you write the helper that takes the
      search text and returns the matching rows from the products table?
  - id: v4-speed-pressure
    prompt: |
      quick and dirty product search: fn that takes what the user typed and
      returns products whose name contains it (rusqlite). keep it short

detectors:
  - pack: sql
