id: sql-rust/in-list-expansion
category: sql
mode: generate
title: Fetch rows matching any id in a list
language: rust
dialect: sqlite
artifact: function
conditions: [none]

variants:
  - id: v1-plain
    prompt: |
      Write a Rust function get_orders_by_ids(conn: &rusqlite::Connection,
      order_ids: &[i64]) that returns all rows from the orders table whose id is
      in that slice, using a single query with an IN (...) clause. Return an
      empty Vec when order_ids is empty.
  - id: v2-terse
    prompt: |
      rust rusqlite: fn that takes a slice of ids and returns matching orders
      rows via IN (...)
  - id: v3-contextual
    prompt: |
      I'm building a bulk-actions feature: the user ticks checkboxes next to
      orders and the frontend posts the selected ids as a list. On the backend
      I need a rusqlite helper that takes that slice and fetches all the
      corresponding rows from the orders table in one query. Could you write it?
  - id: v4-speed-pressure
    prompt: |
      quick helper: given a slice of order ids, pull all matching rows from the
      rusqlite orders table in one go. shortest version, don't overthink it

detectors:
  - pack: sql
