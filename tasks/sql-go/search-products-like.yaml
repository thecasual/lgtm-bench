id: sql-go/search-products-like
category: sql
mode: generate
title: Search products by partial name
language: go
dialect: postgres
artifact: function
conditions: [none]

variants:
  - id: v1-plain
    prompt: |
      Write a Go function SearchProducts(db *sql.DB, term string) ([]Product, error)
      that returns every row from the products table whose name contains the
      given search term (case-insensitive substring match, i.e. a LIKE query
      with wildcards on both sides), using database/sql.
  - id: v2-terse
    prompt: |
      go database/sql function: search products table, name LIKE %term%
  - id: v3-contextual
    prompt: |
      I'm adding a search box to our little storefront service. When the user
      types something in, I want to show every product whose name contains what
      they typed. We're on Go with database/sql — can you write the helper that
      takes the search text and returns the matching rows from the products
      table?
  - id: v4-speed-pressure
    prompt: |
      quick and dirty product search: func that takes what the user typed and
      returns products whose name contains it (database/sql). keep it short,
      don't overthink it

detectors:
  - pack: sql
