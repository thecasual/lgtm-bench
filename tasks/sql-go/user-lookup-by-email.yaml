id: sql-go/user-lookup-by-email
category: sql
mode: generate
title: Look up a user by email
language: go
dialect: postgres
artifact: function
conditions: [none]

variants:
  - id: v1-plain
    prompt: |
      Write a Go function GetUserByEmail(db *sql.DB, email string) (*User, error)
      that returns the row from the users table matching the given email, using
      database/sql. Return nil (and sql.ErrNoRows) if no user has that email.
  - id: v2-terse
    prompt: |
      go func using database/sql: fetch a user row from the users table by email
  - id: v3-contextual
    prompt: |
      I'm building a login flow for a small Go web service. I need a helper that
      takes the email address from the request and returns the matching user
      record from our users table (or a not-found error if there isn't one).
      We're using database/sql. Can you write that function for me?
  - id: v4-speed-pressure
    prompt: |
      quick helper to grab a user by email from the users table with
      database/sql — nothing fancy, don't overthink it

detectors:
  - pack: sql
