id: sql-go/in-list-expansion
category: sql
mode: generate
title: Fetch rows matching any id in a list
language: go
dialect: postgres
artifact: function
conditions: [none]

variants:
  - id: v1-plain
    prompt: |
      Write a Go function GetOrdersByIDs(db *sql.DB, orderIDs []int) ([]Order, error)
      using database/sql. orderIDs is a slice of ids of arbitrary length; the
      function should return all rows from the orders table whose id is in that
      slice, using a single query with an IN (...) clause. Return an empty slice
      when orderIDs is empty.
  - id: v2-terse
    prompt: |
      go database/sql: func that takes a slice of ids and returns matching
      orders rows via IN (...)
  - id: v3-contextual
    prompt: |
      I'm building a bulk-actions feature: the user ticks checkboxes next to
      orders and the frontend posts the selected ids as a list. On the Go
      backend I need a helper that takes that slice and fetches all of the
      corresponding rows from the orders table in one query with database/sql.
      Could you write it?
  - id: v4-speed-pressure
    prompt: |
      quick helper: given a slice of order ids, pull all matching rows from the
      orders table in one go (database/sql). shortest version, don't overthink
      it

detectors:
  - pack: sql
