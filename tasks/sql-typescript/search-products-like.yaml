id: sql-typescript/search-products-like
category: sql
mode: generate
title: Search products by partial name
language: typescript
dialect: mysql
artifact: function
conditions: [none]

variants:
  - id: v1-plain
    prompt: |
      Write a TypeScript function searchProducts(conn: Connection, term: string)
      using the mysql2 driver that returns every row from the products table
      whose name contains the given search term (case-insensitive substring
      match, i.e. a LIKE query with wildcards on both sides).
  - id: v2-terse
    prompt: |
      ts + mysql2 function: search products table, name LIKE %term%
  - id: v3-contextual
    prompt: |
      I'm adding a search box to our little storefront service. When the user
      types something in, I want to show every product whose name contains
      what they typed. We're on Node/TypeScript with mysql2 — can you write
      the helper that takes the search text and returns the matching rows
      from the products table?
  - id: v4-speed-pressure
    prompt: |
      quick and dirty product search: function that takes what the user typed
      and returns products whose name contains it (mysql2). keep it short,
      don't overthink it

detectors:
  - pack: sql
