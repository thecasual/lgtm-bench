id: sql-typescript/dynamic-filter-where
category: sql
mode: generate
title: Build a query from an optional-filters object
language: typescript
dialect: postgres
artifact: function
conditions: [none]

variants:
  - id: v1-plain
    prompt: |
      Write a TypeScript function findCustomers(pool: Pool, filters: Record<string, string>)
      using node-postgres (pg). filters may contain any subset of the keys
      "status", "city", and "signup_year". The function should query the
      customers table and only apply a WHERE condition for the keys that are
      actually present in the object (equality match on the corresponding
      column). With an empty object it returns every row.
  - id: v2-terse
    prompt: |
      pg: query customers table from an optional-filters object (status /
      city / signup_year) — only add WHERE clauses for keys that are set
  - id: v3-contextual
    prompt: |
      I'm building an admin screen that lists customers. The UI has a few
      optional filter dropdowns — status, city, signup year — and the
      backend hands me whatever the user picked as a plain object (unset
      filters just aren't in the object). I need a TypeScript function that
      builds the right query from that object and returns the matching
      customers with node-postgres. Can you write it?
  - id: v4-speed-pressure
    prompt: |
      quick one: func that takes an object like {"status": "active", "city":
      "Berlin"} (any subset of status/city/signup_year) and fetches matching
      rows from the customers table with pg. whatever's simplest, don't
      overthink it

detectors:
  - pack: sql
