rules:
  # ------------------------------------------------------------------
  # Shared taint-mode design (all rules below), mirroring the TypeScript
  # SQL / command-injection packs (rules/semgrep/sql_typescript.yaml,
  # rules/semgrep/cmdi_typescript.yaml) for the cross-site-scripting
  # category. v0.1: see the note at the bottom of this file for the one
  # known parser gap this pack ships with.
  #
  # SOURCES  - untrusted input: any `string`-typed function parameter
  #            (function-declaration and arrow forms, mirroring the other
  #            two TS packs), the common Express getters (req.params.<k>,
  #            req.query.<k>, req.body.<k>) plus a destructured
  #            `const { x } = req.query` / req.body binding, a React
  #            `props.<k>` access (bare and destructured-parameter forms),
  #            `location.hash` / `location.search` (bare and
  #            `window.location.` qualified), and `URLSearchParams.get(...)`
  #            (both the inline `new URLSearchParams(...).get(...)` call and
  #            the assign-then-call `const p = new URLSearchParams(...); ...
  #            p.get(...)` form).
  #
  # SINKS    - the markup/output-STRING argument (only, via
  #            focus-metavariable) of: `$EL.innerHTML = $X` / `$EL.outerHTML
  #            = $X` assignment, `document.write($X)`,
  #            `$EL.insertAdjacentHTML($POS, $X)`, the React
  #            `dangerouslySetInnerHTML: { __html: $X }` prop object (via
  #            `React.createElement(...)`, and a best-effort JSX
  #            `<tag dangerouslySetInnerHTML={{ __html: $X }} />` form - see
  #            the parser-gap note below), and Express `res.send($X)` /
  #            `res.write($X)`.
  #
  # SANITIZERS - idioms that make the markup/output text safe even though a
  #            value derived from tainted input is nearby:
  #              - `DOMPurify.sanitize(...)`: the standard client-side HTML
  #                sanitizer library.
  #              - `escapeHtml(...)` / `he.encode(...)`: common HTML-escape
  #                helper call shapes.
  #              - `Number(...)` / `parseInt(...)`: numeric coercion strips
  #                any markup the original string could carry.
  #              - `$MAP[$KEY]` (excluding bracket reads directly off
  #                req.params/query/body, which are *sources* not lookups
  #                against a fixed allowlist): an allowlist/allow-map lookup
  #                never lets the tainted key itself reach the sink text -
  #                only one of the map's own literal values can.
  #              - allowlist MEMBERSHIP guards where the ORIGINAL tainted
  #                value (not a distinct mapped value) is what reaches the
  #                sink text: `$ALLOWED.includes($X) ? $X : $DEFAULT`,
  #                `if ($ALLOWED.includes($X)) { ...use $X... }`, the
  #                mirror-image negative-branch-returns-early form
  #                (`if (!$ALLOWED.includes($X)) { throw/return; }` followed
  #                later by `...use $X...`), and a `switch ($X) { case "a":
  #                ...use $X... }` allowlist.
  #            Two more safe idioms from the spec need NO explicit
  #            sanitizer entry because they never match the sink patterns
  #            above in the first place (they are absent-sink-match, not
  #            cleared-taint): assigning to `.textContent`/`.innerText`
  #            (a different property name than the innerHTML/outerHTML sink
  #            patterns), an ordinary React `{x}` JSX expression like
  #            `<div>{x}</div>` (no dangerouslySetInnerHTML involved), and
  #            `res.json(x)` (a different method name than send/write).
  #
  # PROPAGATORS - a `let html = "..."; html += $X;` accumulation chain (JS/TS
  #            `+=` is not always tracked by semgrep's default dataflow the
  #            way plain `+` is). Template-literal interpolation
  #            (`` `...${x}...` ``) and plain `+` concatenation are already
  #            tracked by semgrep's built-in JS/TS taint dataflow, so no
  #            propagator is needed for either.
  #
  # PARSER GAP (v0.1, disclosed rather than hidden - see followups): this
  # semgrep build's `typescript` language grammar (there is no `tsx`
  # language available in this OSS build, and shared-core fixed the
  # extension to `.ts` for the whole typescript pack) reliably parses
  # ordinary JSX, but empirically fails to parse a JSX attribute whose value
  # is a double-brace object literal - exactly the
  # `dangerouslySetInnerHTML={{ __html: x }}` shape - once that JSX sits
  # inside a typed function body. A bare top-level JSX expression with the
  # same attribute parses fine; the failure is specific to the
  # function-body + typed-parameter + double-brace-attribute combination
  # that real React components actually use. The `React.createElement(...)`
  # form (what JSX compiles to) has no such ambiguity and is matched
  # reliably by the `xss.ts.dangerously-set-inner-html` rule below; the JSX
  # form is kept in that same rule as a best-effort pattern-either arm since
  # it does catch simpler cases, but this pack should NOT be assumed to
  # reliably catch literal `dangerouslySetInnerHTML={{__html:...}}` JSX in a
  # component function - that is the residual gap this v0.1 ships with.
  # ------------------------------------------------------------------

  - id: xss.ts.tainted-into-dom-sink
    languages: [typescript]
    severity: ERROR
    mode: taint
    message: >-
      Untrusted input reaches a DOM markup sink (innerHTML/outerHTML
      assignment, document.write, or insertAdjacentHTML) without being
      sanitized or escaped (cross-site scripting).
    pattern-sources: &sources
      # A string-typed function parameter (function declaration or arrow).
      - patterns:
          - pattern-either:
              - pattern-inside: |
                  function $F(..., $PARAM: string, ...) { ... }
              - pattern-inside: |
                  function $F(..., $PARAM: string, ...): $RET { ... }
              - pattern-inside: |
                  async function $F(..., $PARAM: string, ...) { ... }
              - pattern-inside: |
                  async function $F(..., $PARAM: string, ...): $RET { ... }
              - pattern-inside: |
                  const $F = (..., $PARAM: string, ...) => { ... }
              - pattern-inside: |
                  const $F = ($PARAM: string, ...): $RET => { ... }
              - pattern-inside: |
                  const $F = async (..., $PARAM: string, ...) => { ... }
              - pattern-inside: |
                  export function $F(..., $PARAM: string, ...) { ... }
              - pattern-inside: |
                  export function $F(..., $PARAM: string, ...): $RET { ... }
              - pattern-inside: |
                  export async function $F(..., $PARAM: string, ...) { ... }
          - pattern: $PARAM
      - pattern: $REQ.params.$K
      - pattern: $REQ.query.$K
      - pattern: $REQ.body.$K
      # Destructured `const { x } = req.query` / req.body (single- and
      # two-key forms; each key destructured is its own taint source).
      - patterns:
          - pattern: |
              const { $X } = $REQ.query
          - focus-metavariable: $X
      - patterns:
          - pattern: |
              const { $X, $Y } = $REQ.query
          - focus-metavariable: $X
      - patterns:
          - pattern: |
              const { $X, $Y } = $REQ.query
          - focus-metavariable: $Y
      - patterns:
          - pattern: |
              const { $X } = $REQ.body
          - focus-metavariable: $X
      - patterns:
          - pattern: |
              const { $X, $Y } = $REQ.body
          - focus-metavariable: $X
      - patterns:
          - pattern: |
              const { $X, $Y } = $REQ.body
          - focus-metavariable: $Y
      # React props: a bare `props.<k>` access (the conventional parameter
      # name for a function-component's props object) ...
      - pattern: props.$K
      # ... and a destructured props parameter, `{ x }` / `{ x }: Props`,
      # both function-declaration and arrow forms.
      - patterns:
          - pattern-either:
              - pattern-inside: |
                  function $F({ $X }, ...) { ... }
              - pattern-inside: |
                  function $F({ $X }: $T, ...) { ... }
              - pattern-inside: |
                  const $F = ({ $X }) => { ... }
              - pattern-inside: |
                  const $F = ({ $X }: $T) => { ... }
          - pattern: $X
      - pattern: location.hash
      - pattern: location.search
      - pattern: window.location.hash
      - pattern: window.location.search
      # Inline URLSearchParams().get(...), and the assign-then-call form
      # where a variable holds the URLSearchParams instance.
      - pattern: new URLSearchParams(...).get(...)
      - patterns:
          - pattern-inside: |
              const $P = new URLSearchParams(...)
              ...
          - pattern: $P.get(...)
    pattern-sinks: &dom-sinks
      - patterns:
          - pattern: $EL.innerHTML = $X
          - focus-metavariable: $X
      - patterns:
          - pattern: $EL.outerHTML = $X
          - focus-metavariable: $X
      - patterns:
          - pattern: document.write($X)
          - focus-metavariable: $X
      - patterns:
          - pattern: $EL.insertAdjacentHTML($POS, $X)
          - focus-metavariable: $X
      # React dangerouslySetInnerHTML, via React.createElement (reliable -
      # see the parser-gap note above) and via a literal JSX attribute
      # (best-effort; not guaranteed to parse in every function-body shape).
      - patterns:
          - pattern: |
              React.createElement($TAG, {..., dangerouslySetInnerHTML: { __html: $X }, ...})
          - focus-metavariable: $X
      - patterns:
          - pattern: |
              <$TAG dangerouslySetInnerHTML={{ __html: $X }} />
          - focus-metavariable: $X
      - patterns:
          - pattern: |
              <$TAG dangerouslySetInnerHTML={{ __html: $X }}>...</$TAG>
          - focus-metavariable: $X
    pattern-sanitizers: &sanitizers
      - by-side-effect: false
        pattern: DOMPurify.sanitize(...)
      - by-side-effect: false
        pattern: escapeHtml(...)
      - by-side-effect: false
        pattern: he.encode(...)
      # A bare `escape(...)` call: the HTML-escaping helper exported by the
      # `html-escaper` / `escape-html` packages (`import { escape } from
      # "html-escaper"`). Same escaping role as escapeHtml/he.encode, just a
      # shorter imported name.
      - by-side-effect: false
        pattern: escape(...)
      # Per-element escaped `.map(cb).join(...)`: an array is rendered by
      # mapping each element to a template-literal row whose ONLY
      # interpolations go through a recognized HTML escaper, then joined into
      # one string. Every value that reaches the sink text is escaped, so the
      # joined result is safe even though the array itself carries taint.
      # Restricting the callback body to an escaper-only interpolation keeps a
      # genuinely-unescaped `.map(r => `<li>${r.title}</li>`).join("")` still
      # flagging (it does not match this sanitizer).
      - by-side-effect: false
        patterns:
          - pattern: $ARR.map(($E) => $BODY).join(...)
          - metavariable-pattern:
              metavariable: $BODY
              pattern-either:
                - pattern: "`...${escapeHtml(...)}...`"
                - pattern: "`...${he.encode(...)}...`"
                - pattern: "`...${DOMPurify.sanitize(...)}...`"
                - pattern: "`...${escape(...)}...`"
      # Inline entity-encoding replace-chain: a `.replace(/</g, "&lt;")` call
      # (with any surrounding `&`/`>` replacements in the same chain) encodes
      # the `<` that would otherwise open an injected tag in element-text
      # context. The sanitizer clears taint only on the replace-chain
      # expression itself, so code that computes an escaped value but then
      # sinks the ORIGINAL unescaped variable still flags (no false negative).
      - by-side-effect: false
        pattern: $X.replace(/</g, "&lt;")
      - by-side-effect: false
        pattern: Number(...)
      - by-side-effect: false
        pattern: parseInt(...)
      - by-side-effect: false
        patterns:
          - pattern: $MAP[$KEY]
          - pattern-not: $REQ.params[$KEY]
          - pattern-not: $REQ.query[$KEY]
          - pattern-not: $REQ.body[$KEY]
      # Allowlist ternary: `ALLOWED.includes(x) ? x : default`.
      - by-side-effect: false
        pattern: "$ALLOWED.includes($X) ? $X : $DEFAULT"
      # Allowlist membership guard, positive-branch form.
      - by-side-effect: false
        patterns:
          - pattern-inside: |
              if ($ALLOWED.includes($X)) {
                ...
              }
          - pattern: $X
      # Allowlist membership guard, negative-branch-returns-early form.
      - by-side-effect: false
        patterns:
          - pattern-inside: |
              if (!$ALLOWED.includes($X)) {
                ...
              }
              ...
          - pattern: $X
      # `switch ($X) { case "a": ...use $X... }` allowlist: the tainted
      # switch subject itself - not a fresh literal - is used inside the
      # matched case.
      - by-side-effect: false
        patterns:
          - pattern-inside: |
              switch ($X) {
                case ...:
                  ...
              }
          - pattern: $X
    pattern-propagators: &propagators
      # `let html = "..."; html += $Y;` accumulation.
      - pattern: $X += $Y
        from: $Y
        to: $X

  - id: xss.ts.tainted-into-http-response
    languages: [typescript]
    severity: ERROR
    mode: taint
    message: >-
      Untrusted input is written straight into an HTTP response body via
      res.send/res.write without being sanitized or escaped; if the
      response is served as HTML this is reflected cross-site scripting.
    pattern-sources: *sources
    pattern-sinks:
      - patterns:
          - pattern: $RES.send($X)
          - focus-metavariable: $X
      - patterns:
          - pattern: $RES.write($X)
          - focus-metavariable: $X
      # res.end(body) is the same reflected-HTML shape as res.send/res.write:
      # a Node/Express handler that ends the response with a concatenated or
      # interpolated HTML string. Focus the body argument only (a bare
      # res.end() with no argument, or res.end(callback), never matches).
      - patterns:
          - pattern: $RES.end($X)
          - focus-metavariable: $X
    pattern-sanitizers: *sanitizers
    pattern-propagators: *propagators
