rules:
  # ---------------------------------------------------------------------------
  # Rule 1: a SQL string built with format! and interpolated (non-constant,
  # non-integer) values. This is the dominant Rust SQLi shape: the query string
  # is assembled with format! and then handed to a sink such as
  #   conn.execute(&q, ...)      client.query(&q, ...)
  #   sqlx::query(&q)            sqlx::query_as::<_, T>(&q)
  #   diesel::sql_query(q)
  # whether directly (`sqlx::query(&format!(...))`) or via a `let q = format!(...)`
  # intermediate. We flag the format! expression itself, so both the direct and
  # the intermediate shapes are covered without enumerating every sink.
  #
  # It MUST NOT fire on the safe idioms, and by construction it does not:
  #   * sqlx::query("... $1 ...").bind(x)         -> string literal, no format!
  #   * sqlx::query!(...) / sqlx::query_as!(...)  -> the `!` macros are a
  #     distinct token from the `query(...)` call and are never format!
  #   * conn.execute("... ?1 ...", params![x])    -> string literal, no format!
  #   * an allowlisted ORDER BY chosen by `match` -> selects a *constant* query
  #     string per branch; no format! is used
  #   * a numeric LIMIT interpolated as an integer -> excluded via pattern-not
  #     (an `x as i64`/`i32`/`u32`/`u64` value cannot carry a SQL payload)
  - id: sql.rust.format-into-query
    languages: [rust]
    severity: ERROR
    message: >-
      SQL query string built with format!() and interpolated values, then run
      via execute()/query()/sqlx::query()/diesel::sql_query(). Interpolated
      input is not escaped -- use bound parameters (?/$1/.bind()) or the
      compile-time-checked query!/query_as! macros instead.
    patterns:
      - pattern: format!($FMT, ...)
      # Only treat it as a SQL query when the format string actually looks like
      # SQL, so unrelated format! calls are not swept in.
      - metavariable-regex:
          metavariable: $FMT
          regex: (?is).*\b(SELECT|INSERT|UPDATE|DELETE|REPLACE|MERGE|CREATE|DROP|ALTER|TRUNCATE)\b.*
      # A lone integer-typed interpolation (e.g. a LIMIT/OFFSET) cannot inject.
      - pattern-not: format!($FMT, $X as i64)
      - pattern-not: format!($FMT, $X as i32)
      - pattern-not: format!($FMT, $X as u32)
      - pattern-not: format!($FMT, $X as u64)
      - pattern-not: format!($FMT, $X as usize)
      - pattern-not: format!($FMT, $X as isize)

  # ---------------------------------------------------------------------------
  # Rule 2: a SQL string built by string concatenation ( + ) or push_str and
  # then handed to an execution sink. Unlike format!, bare concatenation is not
  # self-evidently SQL, so we require the concatenated string to reach a known
  # sink (execute/query/sqlx::query/diesel::sql_query), directly or via a
  # `let q = ...` intermediate.
  - id: sql.rust.concat-into-query
    languages: [rust]
    severity: ERROR
    message: >-
      SQL query string built by string concatenation (+ / push_str) and run via
      execute()/query()/sqlx::query()/diesel::sql_query(). Concatenated input is
      not escaped -- use bound parameters instead.
    pattern-either:
      # --- `+` concatenation passed directly to a sink -----------------------
      - pattern: $C.execute(&($A + $B), ...)
      - pattern: $C.execute(&($A + $B + $D), ...)
      - pattern: $C.execute($A + $B, ...)
      - pattern: $C.query(&($A + $B), ...)
      - pattern: $C.query(&($A + $B + $D), ...)
      - pattern: $C.query(&($A + $B))
      - pattern: $C.query_map(&($A + $B), ...)
      - pattern: sqlx::query(&($A + $B))
      - pattern: sqlx::query(&($A + $B + $D))
      - pattern: sqlx::query($A + $B)
      - pattern: sqlx::query(&(String::from($S) + $X))
      - pattern: sqlx::query(String::from($S) + $X)
      - pattern: diesel::sql_query($A + $B)
      - pattern: diesel::sql_query(&($A + $B))
      # --- `+` concatenation via a `let` intermediate ------------------------
      - pattern: |
          let $Q = $A + $B;
          ...
          $C.execute(&$Q, ...);
      - pattern: |
          let $Q = $A + $B + $D;
          ...
          $C.execute(&$Q, ...);
      - pattern: |
          let $Q = $A + $B;
          ...
          $C.query(&$Q, ...);
      - pattern: |
          let $Q = $A + $B;
          ...
          sqlx::query(&$Q)
      # --- push_str builders -------------------------------------------------
      - pattern: |
          let mut $Q = String::from($S);
          ...
          $Q.push_str($X);
          ...
          $C.execute(&$Q, ...);
      - pattern: |
          let mut $Q = String::from($S);
          ...
          $Q.push_str($X);
          ...
          $C.query(&$Q, ...);
      - pattern: |
          let mut $Q = String::from($S);
          ...
          $Q.push_str($X);
          ...
          sqlx::query(&$Q)
      - pattern: |
          let mut $Q = String::new();
          ...
          $Q.push_str($X);
          ...
          $C.execute(&$Q, ...);
