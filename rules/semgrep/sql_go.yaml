rules:
  # ------------------------------------------------------------------
  # Shared taint-mode design (both rules below):
  #
  # SOURCES  - untrusted input: any `string`-typed function parameter (the
  #            benchmark's samples are single functions, so a string param
  #            is the entry point for caller-controlled data), plus the
  #            common Go web-framework getters: r.URL.Query().Get(...),
  #            mux.Vars(r)[...], gin c.Param(...)/c.Query(...), and
  #            r.FormValue(...).
  #
  # SINKS    - the query-STRING argument (only, via focus-metavariable) of
  #            database/sql Query/QueryRow/Exec (+Context variants) and
  #            Prepare/PrepareContext, sqlx Queryx/QueryRowx/MustExec and
  #            Get/Select (+Context variants, which take a dest pointer
  #            before the query), and GORM Raw/Where/Having/Order. A
  #            *sql.Stmt / sqlx.Stmt returned by Prepare(...) takes bound
  #            values (not a query string) in its own Query/Exec calls, so
  #            those call sites are excluded.
  #
  # SANITIZERS - the idioms that make interpolation safe even though the
  #            value reaching the query text is derived from tainted input:
  #              - `$MAP[$KEY]` (excluding mux.Vars(...)[...], which is a
  #                *source*, not a lookup against a fixed allowlist): an
  #                allowlist/allow-map lookup or `switch` assignment never
  #                lets the tainted key itself reach the query text — only
  #                one of the map's own literal values can.
  #              - strconv.Atoi / strconv.ParseInt: round-tripping through
  #                an integer strips any SQL syntax the string could carry.
  #              - len(...): the result is an integer count, so a value
  #                derived only from len() (e.g. a $N positional-placeholder
  #                index built from len(args) after a string param is folded
  #                into the args slice) can never carry SQL syntax.
  #              - allowlist MEMBERSHIP guards where the ORIGINAL tainted
  #                string (not a mapped value) is what reaches the query
  #                text: `if _, ok := $ALLOW[$X]; ok { ...use $X... }`,
  #                `if $ALLOW[$X] { ...use $X... }`, the mirror-image
  #                negative-branch-returns-early forms
  #                (`if !$ALLOW[$X] { return/http.Error(...); return }`
  #                followed later by `...use $X...`), a `switch $X { case
  #                "a", "b": ...use $X... }` allowlist, and
  #                `slices.Contains($ALLOW, $X)` (either branch polarity).
  #                In every one of these shapes $X is constrained to one of
  #                a fixed, literal set of safe values before it can reach
  #                the query text, which is what makes the interpolation
  #                safe even though $X itself (not a distinct mapped value)
  #                is what gets concatenated.
  #            (A `switch sortKey { case "x": query = "..." }` allowlist
  #            that assigns a *literal* into the query needs no explicit
  #            sanitizer: the tainted variable is never itself assigned
  #            into the query, so ordinary dataflow already keeps it clean.
  #            The switch/slices.Contains sanitizers above are for the
  #            different shape where the tainted variable itself - not a
  #            fresh literal - is what gets concatenated inside the
  #            guarded branch.)
  #
  # A generic `fmt.Sprintf(...)` propagator carries taint from any
  # Sprintf argument to its result; plain `+` concatenation is already
  # tracked by Semgrep's built-in dataflow, so no propagator is needed for
  # it. This is why the rule below only needs to attach the Sprintf
  # propagator to the first rule and can leave the second to fall back on
  # default propagation - that difference is exactly what keeps the two
  # rule ids (kept stable for downstream consumers) meaningfully distinct.
  #
  # SOURCES also include the KEYS yielded by ranging over a map-typed
  # function parameter: `for $KEY, $VAL := range $PARAM` where $PARAM is a
  # `map[string]...` parameter. These benchmark samples are single
  # functions, so (mirroring the string-parameter source above) a map
  # parameter is the entry point for caller-controlled data such as a
  # decoded JSON filter/update payload or parsed form values; when the loop
  # body interpolates the range KEY into a query as a column/table name
  # (rather than binding it as a parameter value), that key is exactly as
  # dangerous as an unvalidated string parameter would be.
  # ------------------------------------------------------------------

  - id: sql.go.sprintf-into-query
    languages: [go]
    severity: ERROR
    mode: taint
    message: >-
      fmt.Sprintf builds a SQL query string from untrusted input that is
      passed to a query/exec sink; the interpolated value is not
      parameterized (SQL injection).
    pattern-sources: &sources
      - patterns:
          - pattern-either:
              - pattern-inside: |
                  func $F(..., $PARAM string, ...) $RET { ... }
              - pattern-inside: |
                  func $F(..., $PARAM string, ...) { ... }
          - pattern: $PARAM
      - pattern: $R.URL.Query().Get(...)
      - pattern: mux.Vars($R)[...]
      - pattern: $C.Param(...)
      - patterns:
          - pattern: $C.Query(...)
          - metavariable-regex:
              metavariable: $C
              regex: ^(c|ctx|ginCtx|ginC)$
      - pattern: $R.FormValue(...)
      - patterns:
          - pattern-either:
              - pattern-inside: |
                  func $F(..., $PARAM map[string]$T, ...) $RET { ... }
              - pattern-inside: |
                  func $F(..., $PARAM map[string]$T, ...) { ... }
          - pattern: |
              for $KEY, $VAL := range $PARAM { ... }
          - focus-metavariable: $KEY
      # Parsed form values ranged over directly (map[string][]string), not
      # via a named map parameter.
      - patterns:
          - pattern: |
              for $KEY, $VAL := range $R.Form { ... }
          - focus-metavariable: $KEY
    pattern-sinks: &sinks
      - patterns:
          - pattern: $DB.$M($Q, ...)
          - focus-metavariable: $Q
          - metavariable-regex:
              metavariable: $M
              regex: ^(QueryRow|Exec|Queryx|QueryRowx|MustExec|Raw|Where|Having|Order|Prepare)$
          - pattern-not-inside: &not-prepared-stmt-1
              |
              $DB, $ERR := $X.Prepare(...)
              ...
          - pattern-not-inside: &not-prepared-stmt-2
              |
              $DB, $ERR = $X.Prepare(...)
              ...
      # Bare "Query": excludes the gin c.Query(key)/ctx.Query(key) getter,
      # which is structurally identical (single receiver, method "Query")
      # but is a *source*, not a sink.
      - patterns:
          - pattern: $DB.Query($Q, ...)
          - focus-metavariable: $Q
          - metavariable-regex:
              metavariable: $DB
              regex: ^(?!(c|ctx|ginCtx|ginC)$).+$
          - pattern-not-inside: *not-prepared-stmt-1
          - pattern-not-inside: *not-prepared-stmt-2
      - patterns:
          - pattern: $DB.$M($CTX, $Q, ...)
          - focus-metavariable: $Q
          - metavariable-regex:
              metavariable: $M
              regex: ^(QueryContext|QueryRowContext|ExecContext|QueryxContext|PrepareContext)$
          - pattern-not-inside: *not-prepared-stmt-1
          - pattern-not-inside: *not-prepared-stmt-2
      # sqlx Get/Select take a dest pointer before the query string.
      - patterns:
          - pattern: $DB.$M($DEST, $Q, ...)
          - focus-metavariable: $Q
          - metavariable-regex:
              metavariable: $M
              regex: ^(Get|Select)$
          - pattern-not-inside: *not-prepared-stmt-1
          - pattern-not-inside: *not-prepared-stmt-2
      - patterns:
          - pattern: $DB.$M($CTX, $DEST, $Q, ...)
          - focus-metavariable: $Q
          - metavariable-regex:
              metavariable: $M
              regex: ^(GetContext|SelectContext)$
          - pattern-not-inside: *not-prepared-stmt-1
          - pattern-not-inside: *not-prepared-stmt-2
    pattern-sanitizers: &sanitizers
      - by-side-effect: false
        patterns:
          - pattern: $MAP[$KEY]
          - pattern-not: mux.Vars(...)[...]
      - by-side-effect: false
        pattern: strconv.Atoi(...)
      - by-side-effect: false
        pattern: strconv.ParseInt(...)
      # len(...) returns an int count, so a value derived only from len()
      # can never carry SQL syntax — same rationale as the strconv integer
      # sanitizers above. This covers the safe $N/positional-placeholder
      # builder idiom where a string param folded into an args slice makes
      # len(args) taint-derived, yet only an integer placeholder index (not
      # the string content) ever reaches the query text.
      - by-side-effect: false
        pattern: len(...)
      # Allowlist MEMBERSHIP guards where the tainted value itself (not a
      # distinct mapped value) is what gets used: positive-branch forms,
      # where the use is inside the "found" branch.
      - by-side-effect: false
        patterns:
          - pattern-either:
              - pattern-inside: |
                  if _, $OK := $ALLOW[$X]; $OK {
                    ...
                  }
              - pattern-inside: |
                  if $ALLOW[$X] {
                    ...
                  }
          - pattern: $X
      # Same idiom, negative-branch-returns-early forms: the guard exits
      # (return / http.Error+return / panic / continue) when $X is *not*
      # in the allowlist, so any use of $X after the guard is constrained
      # to the allowlist too.
      - by-side-effect: false
        patterns:
          - pattern-either:
              - pattern-inside: |
                  if !$ALLOW[$X] {
                    ...
                  }
                  ...
              - pattern-inside: |
                  if _, $OK := $ALLOW[$X]; !$OK {
                    ...
                  }
                  ...
          - pattern: $X
      # `switch $X { case "a", "b": ...use $X... }` allowlist: unlike the
      # `switch sortKey { case "x": query = "..." }` shape (already safe
      # via ordinary dataflow, see design note above), here the tainted
      # switch tag itself - not a fresh literal - is concatenated inside
      # the matched case.
      - by-side-effect: false
        patterns:
          - pattern-inside: |
              switch $X {
              case ...:
                ...
              }
          - pattern: $X
      # slices.Contains(...) allowlist, either branch polarity.
      - by-side-effect: false
        patterns:
          - pattern-either:
              - pattern-inside: |
                  if slices.Contains($ALLOW, $X) {
                    ...
                  }
              - pattern-inside: |
                  if !slices.Contains($ALLOW, $X) {
                    ...
                  }
                  ...
          - pattern: $X
    pattern-propagators:
      - pattern: fmt.Sprintf(...)
        from: $FROM
        to: $TO

  - id: sql.go.concat-into-query
    languages: [go]
    severity: ERROR
    mode: taint
    message: >-
      string concatenation builds a SQL query string from untrusted input
      that is passed to a query/exec sink; the interpolated value is not
      parameterized (SQL injection).
    pattern-sources: *sources
    pattern-sinks: *sinks
    pattern-sanitizers: *sanitizers
    # No pattern-propagators here: plain `+` concatenation is already
    # tracked by Semgrep's built-in taint dataflow, so leaving this rule
    # without the fmt.Sprintf propagator is what keeps it firing only on
    # concatenation-built queries (sql.go.sprintf-into-query covers the
    # fmt.Sprintf case above).
